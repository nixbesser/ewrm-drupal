world_api.viewport:
  path: '/api/world/viewport'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::viewport'
  requirements:
    _permission: 'access content'

world_api.cell:
  path: '/api/world/cell'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::cell'
  requirements:
    _permission: 'access content'

world_api.resolve:
  path: '/api/world/resolve'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::resolve'
  requirements:
    _permission: 'access content'

world_api.infra:
  path: '/api/world/infra'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::infra'
    _format: 'json'
  requirements:
    _permission: 'access content'

world_api.embed:
  path: '/api/embed'
  defaults:
    _controller: '\Drupal\world_api\Controller\EmbedController::embed'
  requirements:
    _permission: 'access content'

world_api.gates:
  path: '/api/world/gates'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::gates'
  requirements:
    _permission: 'access content'

world_api.resolve_gate:
    path: '/api/world/resolve-gate'
    defaults:
      _controller: '\Drupal\world_api\Controller\WorldApiController::resolveGate'
    requirements:
      _permission: 'access content'

world_api.newsletter:
  path: '/api/world/newsletter'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::newsletter'
  requirements:
    _permission: 'access content'
  methods: [GET, OPTIONS]

world_api.object_search:
  path: '/api/world/object-search'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::objectSearch'
  requirements:
    _permission: 'access content'
  methods: [GET, OPTIONS]

world_api.tile_placement:
  path: '/api/world/tile-placement'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::saveTilePlacement'
  requirements:
    _permission: 'access content'
  methods: [POST, OPTIONS]

world_api.tile_placement_delete:
  path: '/api/world/tile-placement/delete'
  defaults:
    _controller: '\Drupal\world_api\Controller\WorldApiController::deleteTilePlacement'
  requirements:
    _permission: 'access content'
  methods: [POST, OPTIONS]

